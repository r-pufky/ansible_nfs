---
###############################################################################
# Default
###############################################################################
# NFS server uses kernel modules and requires VM testing.
#
# Tests:
# * defaults, exports, and services are running.


dependency:
  name: 'galaxy'
driver:
  name: 'vagrant'
  provider:
    name: 'libvirt'
    type: 'libvirt'
provisioner:
  name: 'ansible'
  connection_options:
    ansible_ssh_user: 'vagrant'
    ansible_become: true
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
  inventory:
    group_vars:
      all:
        apt_srv_auto_grub_boot: true  # Testing VM only.
        nfs_flg_server: true
        nfs_flg_client: true
        nfs_cfg_exports:
          - source: '/home/vagrant'
            hosts:
              - host: '127.0.0.1'
                options:
                  - 'rw'
                  - 'sync'
                  - 'fsid=1'
                  - 'all_squash'
                  - 'no_subtree_check'
                  - 'anonuid=1000'
                  - 'anongid=1000'
        nfs_cfg_mounts:
          - server: '127.0.0.1'
            export: '/home/vagrant'
            mount: '/mnt/test/client_test'
            state: 'present'
            options:
              - 'nfsvers=4'
              - 'minorversion=2'
              - 'proto=tcp'
              - 'fsc'
              - 'noauto'
              - 'nofail'
            timeout: 30
          - server: '127.0.0.1'
            export: '/home/vagrant'
            mount: '/mnt/test/client_test_create_path_owner'
            state: 'present'
            mode: '0755'
            owner: 'mail'
            group: 'mail'
            options:
              - 'nfsvers=4'
              - 'minorversion=2'
              - 'proto=tcp'
              - 'fsc'
              - 'noauto'
              - 'nofail'
            timeout: 30
    host_vars:
      nfs-default-fstab:
        nfs_flg_systemd_automount: false
platforms:
  - name: 'nfs-default'
    box: 'debian/trixie64'
    memory: 4096
    cpus: 2
    interfaces:
      - network_name: 'private_network'
        auto_config: true
        type: 'dhcp'
  - name: 'nfs-default-fstab'
    box: 'debian/trixie64'
    memory: 4096
    cpus: 2
    interfaces:
      - network_name: 'private_network'
        auto_config: true
        type: 'dhcp'
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'converge'
    - 'verify'
    - 'destroy'
