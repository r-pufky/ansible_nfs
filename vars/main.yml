---
###############################################################################
# NFS Role Options
###############################################################################

nfs___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-11',
    _debian='trixie',
  ) }}"

nfs___app: "{{ {} | r_pufky.data.v3(

    _exports='/etc/exports',
    _local='/etc/nfs.conf.d/local.conf',
    _systemd_d='/etc/systemd/system',
    _server_drop_in='/etc/systemd/system/nfs-server.service.d/override.conf',
    _mountd_drop_in='/etc/systemd/system/nfs-mountd.service.d/override.conf',
    _default_mount_options=['nfsvers=4', 'minorversion=2', 'proto=tcp', 'fsc'],
  ) }}"

# yamllint disable rule:line-length
###############################################################################
# APT Packages
###############################################################################
# Default required packages for NFS server install.
#
# Reference:
# * https://github.com/zilexa/Homeserver/tree/master/filesystem/networkshares_HowTo-NFSv4.2
# * https://wiki.debian.org/NFSServerSetup
# yamllint enable rule:line-length

nfs___server_packages:
  - 'nfs-kernel-server'

nfs___client_packages:
  - 'nfs-common'
